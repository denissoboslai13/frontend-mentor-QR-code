<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  
  <title>Frontend Mentor | QR code component</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 11px; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body class="bg-[#d6e2f0] font-[Outfit]">
  <main class="flex justify-center h-[98vh] items-center p-4">
    <div class="flex flex-col gap-4 bg-white p-4 items-center h-auto rounded-3xl shadow-lg w-[325px]">
      <div>
        <img src="images/image-qr-code.png" width="max" class="rounded-xl" alt="QR Code">
      </div>
      <div class="flex flex-col gap-4 text-center p-2">
        <div class="font-bold text-2xl text-[#1f3251]">
          <h1>Improve your front-end skills by building projects</h1>
        </div>
        <div class="font-normal px-2.5 mb-3 text-md text-[#68778d]">
          Scan the QR code to visit Frontend Mentor and take your coding skill to the next level
        </div>
      </div>
    </div>
  </main>
  
  <div class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="#">Denis Soboslai</a>.
  </div>


</body>
</html>
